<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0A0F1E"/>
      <stop offset="45%" stop-color="#0C1D3F"/>
      <stop offset="100%" stop-color="#060D1E"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="text-fade" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="glow-r" cx="75%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A0F1E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="260" fill="url(#bg-grad)"/>

  <!-- Radial glow on right -->
  <rect width="1200" height="260" fill="url(#glow-r)"/>

  <!-- Subtle dot grid — right quadrant -->
  <g fill="#1E3A5F" opacity="0.6">
    <circle cx="720" cy="40"  r="1.5"/><circle cx="760" cy="40"  r="1.5"/><circle cx="800" cy="40"  r="1.5"/><circle cx="840" cy="40"  r="1.5"/><circle cx="880" cy="40"  r="1.5"/><circle cx="920" cy="40"  r="1.5"/><circle cx="960" cy="40"  r="1.5"/><circle cx="1000" cy="40" r="1.5"/><circle cx="1040" cy="40" r="1.5"/><circle cx="1080" cy="40" r="1.5"/><circle cx="1120" cy="40" r="1.5"/>
    <circle cx="720" cy="80"  r="1.5"/><circle cx="760" cy="80"  r="1.5"/><circle cx="800" cy="80"  r="1.5"/><circle cx="840" cy="80"  r="1.5"/><circle cx="880" cy="80"  r="1.5"/><circle cx="920" cy="80"  r="1.5"/><circle cx="960" cy="80"  r="1.5"/><circle cx="1000" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1080" cy="80" r="1.5"/><circle cx="1120" cy="80" r="1.5"/>
    <circle cx="720" cy="120" r="1.5"/><circle cx="760" cy="120" r="1.5"/><circle cx="800" cy="120" r="1.5"/><circle cx="840" cy="120" r="1.5"/><circle cx="880" cy="120" r="1.5"/><circle cx="920" cy="120" r="1.5"/><circle cx="960" cy="120" r="1.5"/><circle cx="1000" cy="120" r="1.5"/><circle cx="1040" cy="120" r="1.5"/><circle cx="1080" cy="120" r="1.5"/><circle cx="1120" cy="120" r="1.5"/>
    <circle cx="720" cy="160" r="1.5"/><circle cx="760" cy="160" r="1.5"/><circle cx="800" cy="160" r="1.5"/><circle cx="840" cy="160" r="1.5"/><circle cx="880" cy="160" r="1.5"/><circle cx="920" cy="160" r="1.5"/><circle cx="960" cy="160" r="1.5"/><circle cx="1000" cy="160" r="1.5"/><circle cx="1040" cy="160" r="1.5"/><circle cx="1080" cy="160" r="1.5"/><circle cx="1120" cy="160" r="1.5"/>
    <circle cx="720" cy="200" r="1.5"/><circle cx="760" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="840" cy="200" r="1.5"/><circle cx="880" cy="200" r="1.5"/><circle cx="920" cy="200" r="1.5"/><circle cx="960" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1040" cy="200" r="1.5"/><circle cx="1080" cy="200" r="1.5"/><circle cx="1120" cy="200" r="1.5"/>
    <circle cx="720" cy="240" r="1.5"/><circle cx="760" cy="240" r="1.5"/><circle cx="800" cy="240" r="1.5"/><circle cx="840" cy="240" r="1.5"/><circle cx="880" cy="240" r="1.5"/><circle cx="920" cy="240" r="1.5"/><circle cx="960" cy="240" r="1.5"/><circle cx="1000" cy="240" r="1.5"/><circle cx="1040" cy="240" r="1.5"/><circle cx="1080" cy="240" r="1.5"/><circle cx="1120" cy="240" r="1.5"/>
  </g>

  <!-- Signal / protection radius arcs — decorative, right side -->
  <g fill="none" stroke="#1E40AF" stroke-opacity="0.5">
    <path d="M 1100 130 m -60 0 a 60 60 0 0 1 60 -60" stroke-width="1.2"/>
    <path d="M 1100 130 m -100 0 a 100 100 0 0 1 100 -100" stroke-width="1"/>
    <path d="M 1100 130 m -140 0 a 140 140 0 0 1 140 -140" stroke-width="0.8"/>
    <path d="M 1100 130 m -180 0 a 180 180 0 0 1 180 -180" stroke-width="0.6"/>
    <path d="M 1100 130 m -220 0 a 220 220 0 0 1 220 -220" stroke-width="0.4"/>
  </g>
  <!-- Node at arc center -->
  <circle cx="1100" cy="130" r="5" fill="#0EA5E9" opacity="0.8"/>
  <circle cx="1100" cy="130" r="10" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.4"/>
  <circle cx="1100" cy="130" r="18" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>

  <!-- Left vertical accent bar -->
  <rect x="52" y="46" width="5" height="168" rx="2.5" fill="url(#accent-grad)"/>

  <!-- Main product name -->
  <text x="80" y="124" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="76" font-weight="700" letter-spacing="-3" fill="url(#text-fade)">SANRAKSH</text>

  <!-- Sanskrit + descriptor -->
  <text x="82" y="158" font-family="Arial, sans-serif" font-size="15" letter-spacing="4" fill="#7DD3FC" opacity="0.9">संरक्ष  ·  AI-POWERED PARAMETRIC INSURANCE ENGINE  ·  INDIA</text>

  <!-- Separator line -->
  <rect x="82" y="176" width="680" height="1" fill="#1E3A5F"/>

  <!-- Metric row -->
  <!-- Metric 1: Settlement -->
  <rect x="82" y="192" width="148" height="30" rx="6" fill="#0C1D3F" stroke="#1E3A5F" stroke-width="1"/>
  <text x="156" y="212" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#94A3B8">
    <tspan font-size="15" font-weight="700" fill="#34D399">22.3s</tspan>
    <tspan dx="4" fill="#64748B">settlement</tspan>
  </text>

  <!-- Metric 2: Auto-approval -->
  <rect x="242" y="192" width="162" height="30" rx="6" fill="#0C1D3F" stroke="#1E3A5F" stroke-width="1"/>
  <text x="323" y="212" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#94A3B8">
    <tspan font-size="15" font-weight="700" fill="#34D399">72.4%</tspan>
    <tspan dx="4" fill="#64748B">auto-approved</tspan>
  </text>

  <!-- Metric 3: Fraud precision -->
  <rect x="416" y="192" width="168" height="30" rx="6" fill="#0C1D3F" stroke="#1E3A5F" stroke-width="1"/>
  <text x="500" y="212" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#94A3B8">
    <tspan font-size="15" font-weight="700" fill="#34D399">94.2%</tspan>
    <tspan dx="4" fill="#64748B">fraud precision</tspan>
  </text>

  <!-- Metric 4: Coverage -->
  <rect x="596" y="192" width="170" height="30" rx="6" fill="#0C1D3F" stroke="#1E3A5F" stroke-width="1"/>
  <text x="681" y="212" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#94A3B8">
    <tspan font-size="15" font-weight="700" fill="#34D399">7.7M</tspan>
    <tspan dx="4" fill="#64748B">workers targeted</tspan>
  </text>
</svg>
